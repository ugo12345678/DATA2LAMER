name: Check Alerts & Notify

on:
  # Se lance après chaque run de forecast (les 3 runs quotidiens)
  workflow_run:
    workflows: ["Forecast Predictions"]
    types: [completed]
    branches: [main]
  # Lancement manuel possible
  workflow_dispatch:

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    # Ne lancer que si le forecast a réussi (ou si déclenché manuellement)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_KEY }}

      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL || 'onboarding@resend.dev' }}

      MODEL_VERSION: v1
      MIN_DATA_COMPLETENESS: "0.5"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase requests

      - name: Check alerts and send notifications
        run: python -m pscripts.check_alerts

      - name: Upload alert report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alert-report-${{ github.run_id }}
          path: artifacts/alert_report.json
          retention-days: 30
