name: Check Alerts & Notify

on:
  workflow_run:
    workflows: ["Environment Forecast Sync"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    env:
      VU2LAMER_SUPABASE_URL: ${{ secrets.VU2LAMER_SUPABASE_URL }}
      VU2LAMER_SUPABASE_SERVICE_KEY: ${{ secrets.VU2LAMER_SUPABASE_SERVICE_KEY }}
      FORECAST_TARGET_TIMEZONE: Europe/Paris

      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL || 'onboarding@resend.dev' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase requests

      - name: Check alerts and send notifications
        run: python -m pscripts.check_alerts

      - name: Upload alert report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alert-report-${{ github.run_id }}
          path: artifacts/alert_report.json
          retention-days: 30
