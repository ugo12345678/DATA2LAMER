name: Environment Forecast Sync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: environment-forecast-sync
  cancel-in-progress: false

jobs:
  forecast-job:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    env:
      VU2LAMER_SUPABASE_URL: ${{ secrets.VU2LAMER_SUPABASE_URL }}
      VU2LAMER_SUPABASE_SERVICE_KEY: ${{ secrets.VU2LAMER_SUPABASE_SERVICE_KEY }}

      DATA2LAMER_SUPABASE_URL: ${{ secrets.DATA2LAMER_SUPABASE_URL }}
      DATA2LAMER_SUPABASE_SERVICE_KEY: ${{ secrets.DATA2LAMER_SUPABASE_SERVICE_KEY }}

      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_SOURCE_VALUES_PREFIX: ${{ vars.R2_SOURCE_VALUES_PREFIX || 'environment/source_values' }}

      CMEMS_USERNAME: ${{ secrets.CMEMS_USERNAME }}
      CMEMS_PASSWORD: ${{ secrets.CMEMS_PASSWORD }}

      FORECAST_DAYS: ${{ vars.FORECAST_DAYS || '3' }}
      FORECAST_TARGET_TIMEZONE: Europe/Paris
      OPEN_METEO_BATCH_SIZE: ${{ vars.OPEN_METEO_BATCH_SIZE || '50' }}
      APP_PROVENANCE_MODE: compact
      DATA2LAMER_STORE_SOURCE_VALUES: false
      FORECAST_PUSH_TO_SUPABASE: false
      FORECAST_UPSERT_BATCH_SIZE: ${{ vars.FORECAST_UPSERT_BATCH_SIZE || '100' }}
      FORECAST_THREAD_WORKERS: ${{ vars.FORECAST_THREAD_WORKERS || '2' }}
      SPOT_MARGIN_DEG: 0.03
      ENABLE_CMEMS: ${{ vars.ENABLE_CMEMS || 'true' }}
      ENABLE_METNO: ${{ vars.ENABLE_METNO || 'true' }}
      FORECAST_SOURCES: ${{ vars.FORECAST_SOURCES || 'open_meteo_weather,open_meteo_dwd_icon,open_meteo_marine,open_meteo_marine_meteofrance_wave,metno_locationforecast,shom_tide_coefficients' }}
      METNO_USER_AGENT: ${{ vars.METNO_USER_AGENT || 'DATA2LAMER/1.0 github-actions' }}
      ENABLE_SHOM_TIDES: ${{ vars.ENABLE_SHOM_TIDES || 'true' }}
      SHOM_TIDE_HARBOR: ${{ vars.SHOM_TIDE_HARBOR || 'BREST' }}
      SHOM_TIDE_UTC: ${{ vars.SHOM_TIDE_UTC || '0' }}
      ENABLE_MAREE_INFO_TIDES: ${{ vars.ENABLE_MAREE_INFO_TIDES || 'false' }}
      MAREE_INFO_PORT_ID: ${{ vars.MAREE_INFO_PORT_ID || '82' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-forecast.txt

      - name: Fetch and archive hourly environment forecasts
        run: python -m pscripts.environment.sync_environment_forecasts
