name: Refresh Regulations Database

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

jobs:
  refresh-regulations-database:
    runs-on: ubuntu-latest

    env:
      VU2LAMER_SUPABASE_URL: ${{ secrets.VU2LAMER_SUPABASE_URL }}
      VU2LAMER_SUPABASE_SERVICE_KEY: ${{ secrets.VU2LAMER_SUPABASE_SERVICE_KEY }}

      # Optionnels si ton schema differe
      REG_SPOTS_TABLE: ${{ vars.REG_SPOTS_TABLE || 'spots' }}
      REG_ZONES_TABLE: ${{ vars.REG_ZONES_TABLE || 'zones' }}
      REG_ENABLE_ZONES: ${{ vars.REG_ENABLE_ZONES || 'true' }}
      REG_ALLOW_SPOTS_FALLBACK_FOR_ZONE_UNION: ${{ vars.REG_ALLOW_SPOTS_FALLBACK_FOR_ZONE_UNION || 'true' }}
      REG_SOURCE_CATALOG_FILE: data/regulations/source_endpoints.json
      REG_SOURCE_DISCOVERY_CONFIG_FILE: data/regulations/source_discovery_config.json
      REG_DISCOVERED_SOURCES_FILE: data/regulations/generated_source_candidates.json
      REG_SOURCE_COVERAGE_REPORT_FILE: data/regulations/source_coverage_report.json
      REG_QUALITY_EXPECTATIONS_FILE: data/regulations/quality_expectations.json
      REG_RAW_DOCUMENT_STORE_DIR: data/regulations/raw_documents
      REG_STATIC_LEGIFRANCE_RULES_FILE: data/regulations/static_legifrance_rules.json
      REG_GENERATED_RULES_FILE: data/regulations/generated_rules.json
      REG_GEOSPATIAL_RULES_FILE: data/regulations/generated_rules.json
      REG_RULE_CANDIDATES_FILE: data/regulations/generated_rule_candidates.json
      REG_SOURCE_DOCUMENTS_FILE: data/regulations/source_documents_manifest.json
      REG_ENABLE_AUDIT_MODEL: ${{ vars.REG_ENABLE_AUDIT_MODEL || 'true' }}
      REG_ENABLE_AI_AUDIT: ${{ vars.REG_ENABLE_AI_AUDIT || 'false' }}
      REG_AI_API_KEY: ${{ secrets.REG_AI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      REG_AI_BASE_URL: ${{ vars.REG_AI_BASE_URL || 'https://openrouter.ai/api/v1' }}
      REG_AI_MODEL: ${{ vars.REG_AI_MODEL || 'openrouter/free' }}
      REG_AI_MAX_RULES: ${{ vars.REG_AI_MAX_RULES || '200' }}
      REG_DISCOVERY_ENABLE_AI_CLASSIFIER: ${{ vars.REG_DISCOVERY_ENABLE_AI_CLASSIFIER || 'false' }}
      REG_MARK_MISSING_RULES: ${{ vars.REG_MARK_MISSING_RULES || 'true' }}
      REG_ENABLE_PDF_OCR: ${{ vars.REG_ENABLE_PDF_OCR || 'false' }}
      REG_OCR_LANG: "fra+eng"
      REG_OCR_MIN_TEXT_CHARS: "900"
      REG_OCR_MAX_PAGES: "8"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OCR system dependencies
        if: ${{ env.REG_ENABLE_PDF_OCR == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-fra poppler-utils

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-forecast.txt

      - name: Run regulations unit tests
        run: python -m unittest tests/test_refresh_regulations_database.py tests/test_build_regulations_feed.py tests/test_discover_regulation_sources.py -v

      - name: Restore incremental regulations cache
        uses: actions/cache@v4
        with:
          path: |
            data/regulations/source_fetch_state.json
            data/regulations/generated_rules.json
            data/regulations/generated_rule_candidates.json
            data/regulations/source_documents_manifest.json
            data/regulations/generated_source_candidates.json
            data/regulations/source_coverage_report.json
            data/regulations/raw_documents
          key: regulations-feed-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            regulations-feed-${{ github.ref_name }}-

      - name: Discover regulation source candidates
        run: python -m pscripts.regulations.discover_regulation_sources

      - name: Build regulations feed from official sources
        run: python -m pscripts.regulations.build_regulations_feed

      - name: Upload regulations artifacts
        uses: actions/upload-artifact@v4
        with:
          name: regulations-feed
          path: |
            data/regulations/generated_rules.json
            data/regulations/quality_report.json
            data/regulations/generated_rule_candidates.json
            data/regulations/source_documents_manifest.json
            data/regulations/generated_source_candidates.json
            data/regulations/source_coverage_report.json
            data/regulations/source_fetch_state.json
            data/regulations/raw_documents

      - name: Sync regulations database
        run: python -m pscripts.refresh_regulations_database
