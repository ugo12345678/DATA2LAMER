name: Build Regulations Artifacts

on:
  workflow_dispatch:
    inputs:
      ai_enabled:
        description: "Enable AI audit/confidence scoring"
        required: true
        type: boolean
        default: true
jobs:
  regulations:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      REG_ENABLE_AI_AUDIT: ${{ inputs.ai_enabled }}
      REG_AI_API_KEY: ${{ secrets.REG_AI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      REG_SOURCE_DISCOVERY_CONFIG_FILE: data/regulations/source_discovery_config.json
      REG_DISCOVERED_SOURCES_FILE: data/regulations/generated_source_candidates.json
      REG_SOURCE_COVERAGE_REPORT_FILE: data/regulations/source_coverage_report.json
      REG_QUALITY_EXPECTATIONS_FILE: data/regulations/quality_expectations.json
      REG_RAW_DOCUMENT_STORE_DIR: data/regulations/raw_documents
      REG_AI_BASE_URL: ${{ vars.REG_AI_BASE_URL || 'https://openrouter.ai/api/v1' }}
      REG_AI_MODEL: ${{ vars.REG_AI_MODEL || 'openrouter/free' }}
      REG_AI_MAX_RULES: ${{ vars.REG_AI_MAX_RULES || '200' }}
      REG_DISCOVERY_ENABLE_AI_CLASSIFIER: ${{ vars.REG_DISCOVERY_ENABLE_AI_CLASSIFIER || 'false' }}
      REG_ENABLE_PDF_OCR: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            requirements-forecast.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-forecast.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Restore incremental regulations cache
        uses: actions/cache@v4
        with:
          path: |
            data/regulations/source_fetch_state.json
            data/regulations/generated_rules.json
            data/regulations/generated_rule_candidates.json
            data/regulations/source_documents_manifest.json
            data/regulations/generated_source_candidates.json
            data/regulations/source_coverage_report.json
            data/regulations/raw_documents
          key: regulations-feed-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            regulations-feed-${{ github.ref_name }}-

      - name: Discover regulation source candidates
        run: python -m pscripts.regulations.discover_regulation_sources

      - name: Build regulations artifacts
        run: python -m pscripts.regulations.build_regulations_feed

      - name: Upload generated regulations artifacts
        uses: actions/upload-artifact@v4
        with:
          name: regulations-feed
          path: |
            data/regulations/generated_rules.json
            data/regulations/quality_report.json
            data/regulations/generated_rule_candidates.json
            data/regulations/source_documents_manifest.json
            data/regulations/generated_source_candidates.json
            data/regulations/source_coverage_report.json
            data/regulations/source_fetch_state.json
            data/regulations/raw_documents
