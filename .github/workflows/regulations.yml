name: Build regulations feed

on:
  workflow_dispatch:
    inputs:
      ai_enabled:
        description: "Enable AI audit/confidence scoring"
        required: true
        type: boolean
        default: true
      sync_to_supabase:
        description: "Sync generated regulations to Supabase"
        required: true
        type: boolean
        default: false

jobs:
  regulations:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      REG_ENABLE_AI_AUDIT: ${{ inputs.ai_enabled }}
      REG_AI_API_KEY: ${{ secrets.REG_AI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      REG_AI_BASE_URL: ${{ vars.REG_AI_BASE_URL || 'https://openrouter.ai/api/v1' }}
      REG_AI_MODEL: ${{ vars.REG_AI_MODEL || 'openrouter/free' }}
      REG_AI_MAX_RULES: ${{ vars.REG_AI_MAX_RULES || '200' }}
      REG_ENABLE_PDF_OCR: "false"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-forecast.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-forecast.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build regulations feed
        run: python -m pscripts.regulations.build_regulations_feed

      - name: Upload generated regulations artifacts
        uses: actions/upload-artifact@v4
        with:
          name: regulations-feed
          path: |
            data/regulations/generated_rules.json
            data/regulations/quality_report.json
            data/regulations/generated_rule_candidates.json
            data/regulations/source_documents_manifest.json

      - name: Sync regulations to Supabase
        if: ${{ inputs.sync_to_supabase }}
        run: python -m pscripts.sync_regulation_geospatial_links
