name: Environment Forecast Publish

on:
  workflow_run:
    workflows: ["Environment Forecast Sync"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: environment-forecast-publish
  cancel-in-progress: false

jobs:
  publish-job:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      VU2LAMER_SUPABASE_URL: ${{ secrets.VU2LAMER_SUPABASE_URL }}
      VU2LAMER_SUPABASE_SERVICE_KEY: ${{ secrets.VU2LAMER_SUPABASE_SERVICE_KEY }}

      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_SOURCE_VALUES_PREFIX: ${{ vars.R2_SOURCE_VALUES_PREFIX || 'environment/source_values' }}

      FORECAST_TARGET_TIMEZONE: Europe/Paris
      APP_PROVENANCE_MODE: compact
      FORECAST_UPSERT_BATCH_SIZE: ${{ vars.FORECAST_UPSERT_BATCH_SIZE || '100' }}
      FORECAST_SOURCES: ${{ vars.FORECAST_SOURCES || 'open_meteo_weather,open_meteo_dwd_icon,open_meteo_marine,open_meteo_marine_meteofrance_wave,metno_locationforecast,maree_info_tide_coefficients' }}
      R2_SYNC_LOOKBACK_HOURS: ${{ vars.R2_SYNC_LOOKBACK_HOURS || '12' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-forecast.txt

      - name: Publish latest R2 environment forecasts to Supabase
        run: python -m pscripts.environment.publish_environment_forecasts
